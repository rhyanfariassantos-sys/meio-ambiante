<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSavana - O Blog da Vida Selvagem</title>
    <style>
        /* --- ESTILIZAÇÃO VISUAL (CSS) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f5f0; /* Tom de areia claro */
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Cabeçalho com imagem de fundo da savana */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=1200') no-repeat center center/cover;
            color: white;
            padding: 80px 0;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            color: #f4a261; /* Laranja Savana */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            font-style: italic;
            color: #e9c46a;
        }

        /* Layout em duas colunas (Flexbox) */
        .main-content {
            display: flex;
            margin-top: 30px;
            gap: 30px;
        }

        /* Área dos posts */
        .posts {
            flex: 2;
        }

        .post {
            background-color: #fff;
            padding: 30px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .post h2 {
            color: #264653;
            margin-bottom: 10px;
        }

        .post .date {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 15px;
        }

        .post p {
            margin-bottom: 15px;
        }

        .post .read-more {
            display: inline-block;
            color: #e76f51;
            text-decoration: none;
            font-weight: bold;
        }

        .post .read-more:hover {
            text-decoration: underline;
        }

        /* Barra Lateral (Sidebar) */
        .sidebar {
            flex: 1;
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            height: fit-content;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .sidebar h3 {
            color: #264653;
            margin-bottom: 15px;
            border-bottom: 2px solid #f4a261;
            padding-bottom: 5px;
        }

        .sidebar p {
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 12px;
        }

        .sidebar ul li a {
            color: #2a9d8f;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar ul li a:hover {
            color: #e76f51;
        }

        /* Rodapé */
        footer {
            background-color: #264653;
            color: white;
            text-align: center;
            padding: 25px 0;
            margin-top: 50px;
            font-size: 0.9rem;
        }

        /* Adaptação automática para telas de celular */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>EcoSavana</h1>
            <p>A vida selvagem e a beleza do coração da África</p>
        </div>
    </header>

    <div class="container main-content">
